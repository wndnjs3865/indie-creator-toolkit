name: daily-page
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily = 15:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate one new page
        run: python scripts/generate-page.py
      - name: Commit & push if new file
        run: |
          if [ -n "$(git status --porcelain content/)" ]; then
            git config user.name "autobiz-bot"
            git config user.email "autobiz-bot@users.noreply.github.com"
            git add content/
            git commit -m "auto: daily page $(date -u +%F)"
            git push
          else
            echo "No new page generated."
          fi
