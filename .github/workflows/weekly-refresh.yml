name: weekly-refresh
on:
  schedule:
    - cron: "0 3 * * 0"   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/fetch-data.py
      - name: Commit snapshot if changed
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "autobiz-bot"
            git config user.email "autobiz-bot@users.noreply.github.com"
            git add data/snapshot.json
            git commit -m "auto: weekly data refresh $(date -u +%F)"
            git push
          fi
