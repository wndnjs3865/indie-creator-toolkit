name: build-and-deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build site
        env:
          GH_USER: ${{ github.repository_owner }}
          SITE_BASE: https://${{ github.repository_owner }}.github.io/indie-creator-toolkit
          # Affiliate IDs — set as repo secrets, empty = build uses bare URLs (still works).
          AMAZON_AFF_US: ${{ secrets.AMAZON_AFF_US }}
          AMAZON_AFF_KR: ${{ secrets.AMAZON_AFF_KR }}
          PARTNERSTACK_NOTION: ${{ secrets.PARTNERSTACK_NOTION }}
          PARTNERSTACK_CLICKUP: ${{ secrets.PARTNERSTACK_CLICKUP }}
          PARTNERSTACK_WEBFLOW: ${{ secrets.PARTNERSTACK_WEBFLOW }}
          IMPACT_ADOBE: ${{ secrets.IMPACT_ADOBE }}
          DIRECT_KIT: ${{ secrets.DIRECT_KIT }}
          DIRECT_BUZZ: ${{ secrets.DIRECT_BUZZ }}
          DIRECT_SUBSTACK: ${{ secrets.DIRECT_SUBSTACK }}
          DIRECT_CONVERTKIT: ${{ secrets.DIRECT_CONVERTKIT }}
        run: python scripts/build.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
